<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
   <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-container">
  <div class="auth-box">
    <h2>Login</h2>

    <input type="email" id="email" class="auth-input" placeholder="Enter Email">
    <input type="password" id="password" class="auth-input" placeholder="Enter Password">

    <button onclick="login()" class="auth-btn">Login</button>

    <div class="auth-link">
      <p>Don't have account? <a href="signup.html">Signup</a></p>
    </div>
  </div>
</div>

<script></script>
<script src="auth.js">
  
const userId = localStorage.getItem("userId");

if (userId) {
    window.location.href = "index.html";
}
</script>
</body>
</html>
